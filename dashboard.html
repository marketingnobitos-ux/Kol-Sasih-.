<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Sasih KOL</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg:#0b1a13;--surface:#122010;--border:#1e3828;--gold:#c9a84c;--gold-lt:#e8cc7a;--text:#e8e4dc;--muted:#7a8c80; }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

  .topbar { background:var(--surface);border-bottom:1px solid var(--border);padding:0.9rem 1.2rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:10; }
  .topbar-title { font-family:'Playfair Display',serif;color:var(--gold);font-size:1.2rem; }
  .topbar a { color:var(--muted);text-decoration:none;font-size:0.8rem;margin-left:auto; }

  .filters { padding:1rem 1.2rem;display:flex;gap:0.7rem;flex-wrap:wrap;border-bottom:1px solid var(--border);background:var(--surface); }
  select { background:#0f1f18;border:1px solid var(--border);color:var(--text);border-radius:8px;padding:0.5rem 0.8rem;font-family:'DM Sans',sans-serif;font-size:0.85rem;outline:none;appearance:none;cursor:pointer;flex:1;min-width:120px; }
  select:focus { border-color:var(--gold); }
  .btn-load { background:var(--gold);color:#0b1a13;border:none;border-radius:8px;padding:0.5rem 1.2rem;font-family:'DM Sans',sans-serif;font-size:0.85rem;font-weight:600;cursor:pointer;white-space:nowrap; }
  .btn-load:hover { background:var(--gold-lt); }

  .container { max-width:900px;margin:0 auto;padding:1.2rem; }

  /* STAT CARDS */
  .stat-row { display:grid;grid-template-columns:repeat(4,1fr);gap:0.8rem;margin-bottom:1.2rem; }
  @media(max-width:600px) { .stat-row { grid-template-columns:repeat(2,1fr); } }
  .stat-card { background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1rem; }
  .stat-label { font-size:0.68rem;text-transform:uppercase;letter-spacing:0.12em;color:var(--muted);margin-bottom:0.4rem; }
  .stat-value { font-size:1.5rem;font-weight:700;color:var(--gold); }
  .stat-sub { font-size:0.75rem;color:var(--muted);margin-top:0.2rem; }

  /* CABANG TABLE */
  .card { background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.2rem;margin-bottom:1.2rem; }
  .card-title { font-size:0.7rem;text-transform:uppercase;letter-spacing:0.15em;color:var(--gold);margin-bottom:1rem;padding-bottom:0.4rem;border-bottom:1px solid var(--border); }
  table { width:100%;border-collapse:collapse;font-size:0.82rem; }
  th { text-align:left;padding:0.5rem 0.6rem;color:var(--muted);font-weight:500;font-size:0.72rem;text-transform:uppercase;letter-spacing:0.08em;border-bottom:1px solid var(--border); }
  td { padding:0.6rem 0.6rem;border-bottom:1px solid rgba(30,56,40,0.5); }
  tr:last-child td { border-bottom:none; }
  .badge { display:inline-block;padding:0.2rem 0.5rem;border-radius:4px;font-size:0.72rem;font-weight:600; }
  .badge-green { background:rgba(52,211,153,0.15);color:#34d399; }
  .badge-yellow { background:rgba(251,191,36,0.15);color:#fbbf24; }
  .badge-red { background:rgba(239,68,68,0.15);color:#ef4444; }

  /* CHARTS */
  .chart-grid { display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;margin-bottom:1.2rem; }
  @media(max-width:600px) { .chart-grid { grid-template-columns:1fr; } }
  .chart-wrap { position:relative;height:220px; }

  /* TOP KOL */
  .kol-list { display:flex;flex-direction:column;gap:0.6rem; }
  .kol-item { display:flex;align-items:center;gap:0.8rem;padding:0.7rem;background:#0f1f18;border-radius:8px; }
  .kol-rank { font-size:1.2rem;width:30px;text-align:center;flex-shrink:0; }
  .kol-name { flex:1;font-weight:500;font-size:0.88rem; }
  .kol-stats { display:flex;gap:0.8rem; }
  .kol-stat { text-align:right; }
  .kol-stat .v { font-size:0.9rem;font-weight:600;color:var(--gold); }
  .kol-stat .l { font-size:0.65rem;color:var(--muted); }

  .empty-state { text-align:center;padding:2rem;color:var(--muted);font-size:0.88rem; }
  .loading { text-align:center;padding:2rem;color:var(--muted); }

  .toast { position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--gold);color:var(--text);padding:0.8rem 1.5rem;border-radius:10px;font-size:0.85rem;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:999; }
  .toast.show { opacity:1; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">📈 Dashboard Performa</div>
  <a href="index.html">← Kembali</a>
</div>

<!-- FILTERS -->
<div class="filters">
  <select id="selBrand" onchange="onBrandChange()">
    <option value="all">Semua Brand</option>
    <option value="Pecel Lele Aminoto">Pecel Lele Aminoto</option>
    <option value="Bolu Sunyaragi">Bolu Sunyaragi</option>
    <option value="Bakmi Jowo">Bakmi Jowo</option>
  </select>
  <select id="selCabang">
    <option value="all">Semua Cabang</option>
  </select>
  <select id="selDari">
    <option value="Januari">Jan</option><option value="Februari">Feb</option>
    <option value="Maret">Mar</option><option value="April">Apr</option>
    <option value="Mei">Mei</option><option value="Juni">Jun</option>
    <option value="Juli">Jul</option><option value="Agustus">Ags</option>
    <option value="September">Sep</option><option value="Oktober">Okt</option>
    <option value="November">Nov</option><option value="Desember">Des</option>
  </select>
  <select id="selSampai">
    <option value="Januari">Jan</option><option value="Februari">Feb</option>
    <option value="Maret">Mar</option><option value="April">Apr</option>
    <option value="Mei">Mei</option><option value="Juni">Jun</option>
    <option value="Juli">Jul</option><option value="Agustus">Ags</option>
    <option value="September">Sep</option><option value="Oktober">Okt</option>
    <option value="November">Nov</option><option value="Desember">Des</option>
  </select>
  <button class="btn-load" onclick="loadDashboard()">🔄 Tampilkan</button>
</div>

<div class="container">

  <!-- STAT SUMMARY -->
  <div class="stat-row">
    <div class="stat-card"><div class="stat-label">Total Views</div><div class="stat-value" id="statViews">—</div><div class="stat-sub">semua platform</div></div>
    <div class="stat-card"><div class="stat-label">Avg ER</div><div class="stat-value" id="statER">—</div><div class="stat-sub">engagement rate</div></div>
    <div class="stat-card"><div class="stat-label">Total Engagement</div><div class="stat-value" id="statEng">—</div><div class="stat-sub">likes+cmnt+save+share</div></div>
    <div class="stat-card"><div class="stat-label">Total KOL</div><div class="stat-value" id="statKOL">—</div><div class="stat-sub">aktivasi</div></div>
  </div>

  <!-- PERFORMA PER CABANG -->
  <div class="card">
    <div class="card-title">Performa Per Cabang</div>
    <div id="cabangTable"><div class="empty-state">Tekan "Tampilkan" untuk memuat data</div></div>
  </div>

  <!-- CHARTS -->
  <div class="chart-grid">
    <div class="card">
      <div class="card-title">Total Views Per Cabang</div>
      <div class="chart-wrap"><canvas id="chartViews"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">Tren ER Per Bulan</div>
      <div class="chart-wrap"><canvas id="chartER"></canvas></div>
    </div>
  </div>

  <!-- TOP KOL -->
  <div class="card">
    <div class="card-title">🏆 Top 3 KOL (by ER)</div>
    <div class="kol-list" id="topKOLList"><div class="empty-state">Belum ada data</div></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz_yv0Ja1kpPXAu__fqm55DfhhPnSWgj0ZTzM78I1NIn7sAK7JiQ-eQKjtohHZo9-k/exec';

const BRANDS_CABANG = {
  'Pecel Lele Aminoto': ['AMS','AMC','AMG'],
  'Bolu Sunyaragi'    : ['Kartini','Kemlaka'],
  'Bakmi Jowo'        : ['Kartini']
};

let chartViews = null, chartER = null;

window.onload = () => {
  // Set bulan default ke bulan sekarang
  const m = new Date().getMonth();
  const bulan = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
  document.getElementById('selDari').value = bulan[Math.max(0, m-2)];
  document.getElementById('selSampai').value = bulan[m];
};

function onBrandChange() {
  const brand = document.getElementById('selBrand').value;
  const sel = document.getElementById('selCabang');
  sel.innerHTML = '<option value="all">Semua Cabang</option>';
  if (brand !== 'all' && BRANDS_CABANG[brand]) {
    BRANDS_CABANG[brand].forEach(c => {
      const o = document.createElement('option'); o.value = c; o.textContent = c; sel.appendChild(o);
    });
  }
}

async function loadDashboard() {
  if (APPS_SCRIPT_URL === 'https://script.google.com/macros/s/AKfycbz_yv0Ja1kpPXAu__fqm55DfhhPnSWgj0ZTzM78I1NIn7sAK7JiQ-eQKjtohHZo9-k/exec') {
    showDemoData();
    return;
  }

  const brand  = document.getElementById('selBrand').value;
  const cabang = document.getElementById('selCabang').value;
  const dari   = document.getElementById('selDari').value;
  const sampai = document.getElementById('selSampai').value;

  document.getElementById('cabangTable').innerHTML = '<div class="loading">⏳ Memuat data...</div>';

  try {
    const url = `${APPS_SCRIPT_URL}?action=getDashboard&brand=${encodeURIComponent(brand)}&cabang=${encodeURIComponent(cabang)}&dari=${encodeURIComponent(dari)}&sampai=${encodeURIComponent(sampai)}`;
    const r = await fetch(url);
    const d = await r.json();
    if (d.status === 'ok') {
      renderDashboard(d);
    } else {
      showToast('❌ ' + d.message);
    }
  } catch(e) {
    showToast('⚠️ Gagal memuat data. Periksa koneksi.');
    document.getElementById('cabangTable').innerHTML = '<div class="empty-state">Gagal memuat data</div>';
  }
}

function renderDashboard(d) {
  const { cabangStats, topKOL, trendBulan } = d;

  // SUMMARY STATS
  const totalViews = cabangStats.reduce((a,b) => a + b.totalViews, 0);
  const totalEng   = cabangStats.reduce((a,b) => a + b.totalEng, 0);
  const totalKOL   = cabangStats.reduce((a,b) => a + b.count, 0);
  const allERs     = cabangStats.flatMap(c => c.ers || []);
  const avgER      = allERs.length ? (allERs.reduce((a,b)=>a+b,0)/allERs.length).toFixed(2) : 0;

  document.getElementById('statViews').textContent = fmtK(totalViews);
  document.getElementById('statER').textContent    = avgER + '%';
  document.getElementById('statEng').textContent   = fmtK(totalEng);
  document.getElementById('statKOL').textContent   = totalKOL;

  // CABANG TABLE
  if (!cabangStats.length) {
    document.getElementById('cabangTable').innerHTML = '<div class="empty-state">Tidak ada data untuk filter ini</div>';
  } else {
    renderCabangTable(cabangStats);
  }

  // CHARTS
  renderChartViews(cabangStats);
  renderChartER(trendBulan);

  // TOP KOL
  renderTopKOL(topKOL);
}

function renderCabangTable(stats) {
  const rows = stats.map(s => `
    <tr>
      <td><strong>${s.brand.split(' ').pop()}</strong><br><span style="font-size:0.72rem;color:var(--muted)">${s.cabang}</span></td>
      <td>${fmtK(s.totalViews)}</td>
      <td>${fmtK(s.totalEng)}</td>
      <td>${getBadge(s.avgER, 'ER')}</td>
      <td>${getBadge(s.avgCPM, 'CPM')}</td>
      <td>${getBadge(s.avgCPE, 'CPE')}</td>
    </tr>`).join('');

  document.getElementById('cabangTable').innerHTML = `
    <table>
      <thead><tr>
        <th>Brand / Cabang</th><th>Views</th><th>Engagement</th>
        <th>Avg ER</th><th>Avg CPM</th><th>Avg CPE</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function getBadge(val, metric) {
  if (!val) return '<span style="color:var(--muted)">—</span>';
  let cls = 'badge-green', lbl = '';
  if (metric === 'ER') {
    lbl = val + '%';
    if (val < 2) cls = 'badge-red';
    else if (val < 4) cls = 'badge-yellow';
  } else if (metric === 'CPM') {
    lbl = 'Rp' + fmtK(val);
    if (val > 20000) cls = 'badge-red';
    else if (val > 10000) cls = 'badge-yellow';
  } else if (metric === 'CPE') {
    lbl = 'Rp' + fmtK(val);
    if (val > 800) cls = 'badge-red';
    else if (val > 300) cls = 'badge-yellow';
  }
  return `<span class="badge ${cls}">${lbl}</span>`;
}

function renderChartViews(stats) {
  const labels = stats.map(s => s.cabang + ' (' + s.brand.split(' ')[0] + ')');
  const values = stats.map(s => s.totalViews);
  const colors = ['#c9a84c','#e8cc7a','#a07830','#d4b060','#8b6420','#f0d088'];

  if (chartViews) chartViews.destroy();
  const ctx = document.getElementById('chartViews').getContext('2d');
  chartViews = new Chart(ctx, {
    type: 'bar',
    data: { labels, datasets: [{ label:'Views', data: values, backgroundColor: colors, borderRadius: 6 }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        y: { ticks: { color:'#7a8c80', callback: v => fmtK(v) }, grid: { color:'#1e3828' } },
        x: { ticks: { color:'#7a8c80', font: { size: 9 } }, grid: { display: false } }
      }
    }
  });
}

function renderChartER(trend) {
  const labels = trend.map(t => t.bulan.substring(0,3));
  const values = trend.map(t => t.avgER);

  if (chartER) chartER.destroy();
  const ctx = document.getElementById('chartER').getContext('2d');
  chartER = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'Avg ER (%)',
        data: values,
        borderColor: '#c9a84c',
        backgroundColor: 'rgba(201,168,76,0.1)',
        tension: 0.4,
        pointBackgroundColor: '#c9a84c',
        fill: true
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        y: { ticks: { color:'#7a8c80', callback: v => v + '%' }, grid: { color:'#1e3828' } },
        x: { ticks: { color:'#7a8c80', font:{ size:9 } }, grid: { display:false } }
      }
    }
  });
}

function renderTopKOL(topKOL) {
  const icons = ['🥇','🥈','🥉'];
  if (!topKOL || !topKOL.length) {
    document.getElementById('topKOLList').innerHTML = '<div class="empty-state">Belum ada data KOL</div>';
    return;
  }
  document.getElementById('topKOLList').innerHTML = topKOL.map((k, i) => `
    <div class="kol-item">
      <div class="kol-rank">${icons[i] || (i+1)}</div>
      <div class="kol-name">${k.nama}</div>
      <div class="kol-stats">
        <div class="kol-stat"><div class="v">${k.avgER}%</div><div class="l">Avg ER</div></div>
        <div class="kol-stat"><div class="v">Rp${fmtK(k.avgCPE)}</div><div class="l">Avg CPE</div></div>
      </div>
    </div>`).join('');
}

// DEMO DATA (jika Apps Script belum setup)
function showDemoData() {
  const demoData = {
    cabangStats: [
      { brand:'Pecel Lele Aminoto', cabang:'AMS', totalViews:45000, totalEng:1800, count:4, avgER:4.5, avgCPM:8500, avgCPE:280, ers:[4.5] },
      { brand:'Pecel Lele Aminoto', cabang:'AMC', totalViews:38000, totalEng:1200, count:3, avgER:3.8, avgCPM:12000, avgCPE:350, ers:[3.8] },
      { brand:'Bolu Sunyaragi',     cabang:'Kartini', totalViews:52000, totalEng:2500, count:5, avgER:5.2, avgCPM:7000, avgCPE:200, ers:[5.2] },
      { brand:'Bakmi Jowo',         cabang:'Kartini', totalViews:29000, totalEng:900, count:2, avgER:3.1, avgCPM:15000, avgCPE:420, ers:[3.1] }
    ],
    topKOL: [
      { nama:'@foodlover_crb', avgER:6.2, avgCPE:180 },
      { nama:'@kuliner_cirebon', avgER:5.5, avgCPE:210 },
      { nama:'@yummycrb', avgER:4.8, avgCPE:260 }
    ],
    trendBulan: [
      { bulan:'Oktober', avgER:3.8 }, { bulan:'November', avgER:4.2 }, { bulan:'Desember', avgER:4.9 }
    ]
  };
  renderDashboard(demoData);
  showToast('ℹ️ Mode demo — sambungkan Apps Script untuk data nyata');
}

function fmtK(n) {
  if (!n) return '0';
  if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n/1000).toFixed(1) + 'K';
  return Math.round(n).toString();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}

// Auto-load demo saat pertama buka
window.onload = () => {
  const m = new Date().getMonth();
  const bulan = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
  document.getElementById('selDari').value = bulan[Math.max(0, m-2)];
  document.getElementById('selSampai').value = bulan[m];
  if (APPS_SCRIPT_URL === 'https://script.google.com/macros/s/AKfycbz_yv0Ja1kpPXAu__fqm55DfhhPnSWgj0ZTzM78I1NIn7sAK7JiQ-eQKjtohHZo9-k/exec') showDemoData();
};
</script>
</body>
</html>
