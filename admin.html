<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel — Sasih</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b1a13; --surface: #122010; --border: #1e3828;
    --gold: #c9a84c; --gold-lt: #e8cc7a; --text: #e8e4dc; --muted: #7a8c80;
    --red: #e53e3e; --green: #38a169;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* LOGIN */
  #loginScreen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem;
  }
  .login-box {
    background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
    padding: 2.5rem 2rem; width: 100%; max-width: 380px; text-align: center;
  }
  .login-title { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: var(--gold); margin-bottom: 0.3rem; }
  .login-sub { color: var(--muted); font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 2rem; }

  /* HEADER */
  .topbar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 0.9rem 1.2rem; display: flex; align-items: center; gap: 1rem; position: sticky; top: 0; z-index: 100;
  }
  .topbar-title { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 1.2rem; }
  .topbar a { color: var(--muted); text-decoration: none; font-size: 0.8rem; margin-left: auto; }

  /* SELECTORS */
  .selectors { padding: 1rem 1.2rem; display: flex; gap: 0.7rem; flex-wrap: wrap; border-bottom: 1px solid var(--border); }
  select, input[type=text], input[type=date], input[type=color], textarea {
    background: #0f1f18; border: 1px solid var(--border); color: var(--text);
    border-radius: 8px; padding: 0.55rem 0.8rem; font-family: 'DM Sans', sans-serif; font-size: 0.88rem;
    width: 100%; outline: none; transition: border 0.2s;
  }
  select:focus, input:focus, textarea:focus { border-color: var(--gold); }
  select { appearance: none; cursor: pointer; }
  textarea { resize: vertical; min-height: 80px; }

  /* FORM */
  .form-area { padding: 1.2rem; display: none; }
  .form-area.active { display: block; }
  .section { margin-bottom: 1.5rem; }
  .section-title {
    font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.15em;
    color: var(--gold); margin-bottom: 0.8rem; padding-bottom: 0.4rem;
    border-bottom: 1px solid var(--border);
  }
  .field { margin-bottom: 0.9rem; }
  .field label { display: block; font-size: 0.78rem; color: var(--muted); margin-bottom: 0.35rem; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.7rem; }
  .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.7rem; }

  /* COLOR PICK */
  .color-row { display: flex; align-items: center; gap: 0.7rem; }
  input[type=color] { width: 42px; height: 38px; padding: 2px; cursor: pointer; border-radius: 6px; }
  .color-hex { flex: 1; }

  /* LIST (dos/donts) */
  .list-item { display: flex; gap: 0.5rem; margin-bottom: 0.5rem; }
  .list-item input { flex: 1; }
  .btn-remove { background: none; border: 1px solid #5a2a2a; color: #e57373; border-radius: 6px; padding: 0.3rem 0.6rem; cursor: pointer; font-size: 0.8rem; }
  .btn-add { background: none; border: 1px dashed var(--border); color: var(--muted); border-radius: 8px; padding: 0.5rem; cursor: pointer; width: 100%; font-size: 0.82rem; margin-top: 0.3rem; transition: all 0.2s; }
  .btn-add:hover { border-color: var(--gold); color: var(--gold); }

  /* KAMPANYE TABLE */
  .kampanye-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; }
  .kampanye-item label { display: block; font-size: 0.72rem; color: var(--muted); margin-bottom: 0.25rem; }

  /* LOGO UPLOAD */
  .logo-area {
    border: 2px dashed var(--border); border-radius: 12px; padding: 1.2rem; text-align: center;
    cursor: pointer; transition: border 0.2s; position: relative;
  }
  .logo-area:hover { border-color: var(--gold); }
  .logo-area input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .logo-preview { max-width: 120px; max-height: 80px; object-fit: contain; display: none; margin: 0 auto; }
  .logo-placeholder { color: var(--muted); font-size: 0.82rem; }

  /* BUTTONS */
  .btn {
    display: inline-flex; align-items: center; gap: 0.5rem; justify-content: center;
    border: none; border-radius: 8px; padding: 0.7rem 1.4rem; font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: all 0.2s; width: 100%;
  }
  .btn-primary { background: var(--gold); color: #0b1a13; }
  .btn-primary:hover { background: var(--gold-lt); }
  .btn-secondary { background: var(--border); color: var(--text); }
  .btn-login { background: var(--gold); color: #0b1a13; margin-top: 1rem; }

  /* TOAST */
  .toast {
    position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
    background: #1a3c2e; border: 1px solid var(--gold); color: var(--text);
    padding: 0.8rem 1.5rem; border-radius: 10px; font-size: 0.85rem;
    opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999;
  }
  .toast.show { opacity: 1; }

  #mainApp { display: none; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-title">Admin Panel</div>
    <div class="login-sub">Sasih · KOL Management System</div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="pwInput" placeholder="Masukkan password..." onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div id="loginErr" style="color:#e57373;font-size:0.8rem;margin-top:0.5rem;display:none">Password salah</div>
    <button class="btn btn-login" onclick="doLogin()">🔐 Masuk</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="mainApp">
  <div class="topbar">
    <div class="topbar-title">⚙️ Admin Panel</div>
    <a href="index.html">← Kembali</a>
  </div>

  <!-- SELECTORS -->
  <div class="selectors">
    <div style="flex:1;min-width:160px;">
      <label style="font-size:0.72rem;color:var(--muted);display:block;margin-bottom:0.3rem;">Brand</label>
      <select id="selBrand" onchange="onBrandChange()">
        <option value="">— Pilih Brand —</option>
        <option value="Pecel Lele Aminoto">🍽️ Pecel Lele Aminoto</option>
        <option value="Bolu Sunyaragi">🎂 Bolu Sunyaragi</option>
        <option value="Bakmi Jowo">🍜 Bakmi Jowo</option>
      </select>
    </div>
    <div style="flex:1;min-width:140px;">
      <label style="font-size:0.72rem;color:var(--muted);display:block;margin-bottom:0.3rem;">Cabang</label>
      <select id="selCabang" onchange="loadConfig()">
        <option value="">— Pilih Cabang —</option>
      </select>
    </div>
  </div>

  <!-- FORM EDITOR -->
  <div class="form-area" id="formArea">

    <!-- IDENTITAS -->
    <div class="section">
      <div class="section-title">Identitas Brand</div>
      <div class="row2">
        <div class="field"><label>Handle IG Brand</label><input type="text" id="fHandleIG" placeholder="@pecellelaminoto"></div>
        <div class="field"><label>Deadline Konten</label><input type="date" id="fDeadline"></div>
      </div>
    </div>

    <!-- WARNA -->
    <div class="section">
      <div class="section-title">Warna Brand</div>
      <div class="row3">
        <div class="field">
          <label>Warna Utama</label>
          <div class="color-row">
            <input type="color" id="cUtama" value="#1a3c2e" oninput="syncHex('cUtama','hUtama')">
            <input type="text" id="hUtama" class="color-hex" value="#1a3c2e" oninput="syncColor('hUtama','cUtama')">
          </div>
        </div>
        <div class="field">
          <label>Warna Aksen</label>
          <div class="color-row">
            <input type="color" id="cAksen" value="#c9a84c" oninput="syncHex('cAksen','hAksen')">
            <input type="text" id="hAksen" class="color-hex" value="#c9a84c" oninput="syncColor('hAksen','cAksen')">
          </div>
        </div>
        <div class="field">
          <label>Background PDF</label>
          <div class="color-row">
            <input type="color" id="cBg" value="#ffffff" oninput="syncHex('cBg','hBg')">
            <input type="text" id="hBg" class="color-hex" value="#ffffff" oninput="syncColor('hBg','cBg')">
          </div>
        </div>
      </div>
    </div>

    <!-- LOGO -->
    <div class="section">
      <div class="section-title">Logo Brand</div>
      <div class="logo-area" id="logoArea" onclick="document.getElementById('logoFile').click()">
        <input type="file" id="logoFile" accept="image/*" onchange="onLogoChange(event)" style="display:none">
        <img id="logoPreview" class="logo-preview">
        <div class="logo-placeholder" id="logoPlaceholder">🖼️ Klik untuk upload logo<br><small style="font-size:0.7rem">PNG/JPG, maks 2MB</small></div>
        <button id="btnHapusLogo" onclick="hapusLogo(event)" style="display:none;margin-top:0.6rem;background:none;border:1px solid #5a2a2a;color:#e57373;border-radius:6px;padding:0.3rem 0.8rem;cursor:pointer;font-size:0.78rem">🗑 Hapus Logo</button>
      </div>
    </div>

    <!-- BRIEF KONTEN -->
    <div class="section">
      <div class="section-title">Garis Besar Tema</div>
      <div class="field"><label>Paragraf Utama</label><textarea id="fParagrafUtama" rows="4" placeholder="Jelaskan brand, produk, dan pesan utama yang ingin disampaikan..."></textarea></div>
      <div class="field"><label>Paragraf Tambahan (Opsional)</label><textarea id="fParagrafTambahan" rows="3" placeholder="Informasi tambahan atau konteks campaign..."></textarea></div>
      <div class="field"><label>Catatan Format Konten</label><textarea id="fCatatanFormat" rows="2" placeholder="Instruksi format konten..."></textarea></div>
    </div>

    <!-- DOS -->
    <div class="section">
      <div class="section-title">✅ Dos (Boleh Dilakukan)</div>
      <div id="dosList"></div>
      <button class="btn-add" onclick="addItem('dosList', 'dos')">+ Tambah Poin Dos</button>
    </div>

    <!-- DONTS -->
    <div class="section">
      <div class="section-title">❌ Don'ts (Jangan Dilakukan)</div>
      <div id="dontsList"></div>
      <button class="btn-add" onclick="addItem('dontsList', 'donts')">+ Tambah Poin Don'ts</button>
    </div>

    <!-- KAMPANYE -->
    <div class="section">
      <div class="section-title">📅 Tema Campaign Per Bulan</div>
      <div class="kampanye-grid" id="kampanyeGrid"></div>
    </div>

    <!-- SAVE -->
    <div style="display:flex;gap:0.8rem;margin-bottom:2rem;">
      <button class="btn btn-primary" onclick="saveConfig()">💾 Simpan Konfigurasi</button>
      <button class="btn btn-secondary" onclick="previewBrief()">👁 Preview Brief</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- PREVIEW MODAL -->
<div id="previewModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:200;overflow-y:auto;padding:1rem;">
  <div style="max-width:600px;margin:0 auto;background:#fff;border-radius:12px;padding:2rem;position:relative;">
    <button onclick="document.getElementById('previewModal').style.display='none'"
      style="position:absolute;top:1rem;right:1rem;background:#eee;border:none;border-radius:6px;padding:0.4rem 0.8rem;cursor:pointer">✕ Tutup</button>
    <div id="previewContent"></div>
  </div>
</div>

<script>
// ============================================================
// GANTI URL INI DENGAN URL APPS SCRIPT ANDA
// ============================================================
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz_yv0Ja1kpPXAu__fqm55DfhhPnSWgj0ZTzM78I1NIn7sAK7JiQ-eQKjtohHZo9-k/exec';
const PASSWORD        = 'sasih2024'; // Harus sama dengan ADMIN_PASSWORD di Apps Script

const BRANDS = {
  'Pecel Lele Aminoto': ['AMS','AMC','AMG'],
  'Bolu Sunyaragi'    : ['Kartini','Kemlaka'],
  'Bakmi Jowo'        : ['Kartini']
};
const BULAN_LIST = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];

let currentConfig = {};

// LOGIN
function doLogin() {
  if (document.getElementById('pwInput').value === PASSWORD) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    buildKampanyeGrid();
  } else {
    document.getElementById('loginErr').style.display = 'block';
  }
}

// BRAND / CABANG CHANGE
function onBrandChange() {
  const brand  = document.getElementById('selBrand').value;
  const selCab = document.getElementById('selCabang');
  selCab.innerHTML = '<option value="">— Pilih Cabang —</option>';
  if (!brand) { document.getElementById('formArea').classList.remove('active'); return; }
  (BRANDS[brand] || []).forEach(c => {
    const opt = document.createElement('option');
    opt.value = c; opt.textContent = c;
    selCab.appendChild(opt);
  });
  document.getElementById('formArea').classList.remove('active');
}

async function loadConfig() {
  const brand  = document.getElementById('selBrand').value;
  const cabang = document.getElementById('selCabang').value;
  if (!brand || !cabang) return;

  if (APPS_SCRIPT_URL === 'https://script.google.com/macros/s/AKfycbz_yv0Ja1kpPXAu__fqm55DfhhPnSWgj0ZTzM78I1NIn7sAK7JiQ-eQKjtohHZo9-k/exec') {
    loadDefaultConfig(brand, cabang);
    document.getElementById('formArea').classList.add('active');
    return;
  }
  try {
    const r = await fetch(`${APPS_SCRIPT_URL}?action=getBriefConfig&brand=${encodeURIComponent(brand)}&cabang=${encodeURIComponent(cabang)}`);
    const d = await r.json();
    currentConfig = d.config || {};
  } catch(e) { currentConfig = {}; }
  populateForm();
  document.getElementById('formArea').classList.add('active');
}

function loadDefaultConfig(brand, cabang) {
  currentConfig = {
    brand, cabang, handleIG: '', warnaUtama: '#1a3c2e', warnaAksen: '#c9a84c', warnaBackground: '#ffffff',
    logo: '', paragrafUtama: '', paragrafTambahan: '', catatanFormat: '',
    dos: [''], donts: [''], deadline: '', kampanyePerBulan: {}
  };
  BULAN_LIST.forEach(b => currentConfig.kampanyePerBulan[b] = '');
  populateForm();
}

function populateForm() {
  const c = currentConfig;
  document.getElementById('fHandleIG').value        = c.handleIG || '';
  document.getElementById('fDeadline').value        = c.deadline || '';
  document.getElementById('fParagrafUtama').value   = c.paragrafUtama || '';
  document.getElementById('fParagrafTambahan').value= c.paragrafTambahan || '';
  document.getElementById('fCatatanFormat').value   = c.catatanFormat || '';

  setColor('cUtama', 'hUtama', c.warnaUtama || '#1a3c2e');
  setColor('cAksen', 'hAksen', c.warnaAksen || '#c9a84c');
  setColor('cBg',    'hBg',    c.warnaBackground || '#ffffff');

  // Logo
  if (c.logo) {
    document.getElementById('logoPreview').src = c.logo;
    document.getElementById('logoPreview').style.display = 'block';
    document.getElementById('logoPlaceholder').style.display = 'none';
    document.getElementById('btnHapusLogo').style.display = 'inline-block';
  }

  // Dos & Donts
  renderList('dosList', c.dos || ['']);
  renderList('dontsList', c.donts || ['']);

  // Kampanye
  BULAN_LIST.forEach(b => {
    const el = document.getElementById('kamp_' + b);
    if (el) el.value = (c.kampanyePerBulan || {})[b] || '';
  });
}

function renderList(containerId, items) {
  const el = document.getElementById(containerId);
  el.innerHTML = '';
  items.forEach((v, i) => {
    const row = document.createElement('div');
    row.className = 'list-item';
    row.innerHTML = `<input type="text" value="${escHtml(v)}" placeholder="Tulis poin..." onchange="updateList('${containerId}', ${i}, this.value)">
      <button class="btn-remove" onclick="removeItem('${containerId}', ${i})">✕</button>`;
    el.appendChild(row);
  });
}

function addItem(containerId, key) {
  const listKey = containerId === 'dosList' ? 'dos' : 'donts';
  currentConfig[listKey] = currentConfig[listKey] || [];
  currentConfig[listKey].push('');
  renderList(containerId, currentConfig[listKey]);
}

function removeItem(containerId, idx) {
  const listKey = containerId === 'dosList' ? 'dos' : 'donts';
  currentConfig[listKey].splice(idx, 1);
  renderList(containerId, currentConfig[listKey]);
}

function updateList(containerId, idx, val) {
  const listKey = containerId === 'dosList' ? 'dos' : 'donts';
  currentConfig[listKey][idx] = val;
}

function buildKampanyeGrid() {
  const grid = document.getElementById('kampanyeGrid');
  grid.innerHTML = '';
  BULAN_LIST.forEach(b => {
    const div = document.createElement('div');
    div.className = 'kampanye-item';
    div.innerHTML = `<label>${b}</label><input type="text" id="kamp_${b}" placeholder="Tema campaign...">`;
    grid.appendChild(div);
  });
}

// COLORS
function syncHex(colorId, hexId) {
  document.getElementById(hexId).value = document.getElementById(colorId).value;
}
function syncColor(hexId, colorId) {
  const v = document.getElementById(hexId).value;
  if (/^#[0-9A-Fa-f]{6}$/.test(v)) document.getElementById(colorId).value = v;
}
function setColor(colorId, hexId, val) {
  document.getElementById(colorId).value = val;
  document.getElementById(hexId).value = val;
}

// LOGO
function onLogoChange(e) {
  const file = e.target.files[0];
  if (!file) return;
  if (file.size > 2 * 1024 * 1024) { showToast('⚠️ File terlalu besar (maks 2MB)'); return; }
  const reader = new FileReader();
  reader.onload = ev => {
    currentConfig.logo = ev.target.result;
    document.getElementById('logoPreview').src = ev.target.result;
    document.getElementById('logoPreview').style.display = 'block';
    document.getElementById('logoPlaceholder').style.display = 'none';
    document.getElementById('btnHapusLogo').style.display = 'inline-block';
  };
  reader.readAsDataURL(file);
}
function hapusLogo(e) {
  e.stopPropagation();
  currentConfig.logo = '';
  document.getElementById('logoPreview').style.display = 'none';
  document.getElementById('logoPlaceholder').style.display = 'block';
  document.getElementById('btnHapusLogo').style.display = 'none';
}

// COLLECT & SAVE
function collectConfig() {
  const brand  = document.getElementById('selBrand').value;
  const cabang = document.getElementById('selCabang').value;

  // Kumpulkan dos & donts dari DOM
  const dos   = Array.from(document.querySelectorAll('#dosList input')).map(i => i.value).filter(v => v);
  const donts = Array.from(document.querySelectorAll('#dontsList input')).map(i => i.value).filter(v => v);

  // Kumpulkan kampanye
  const kpb = {};
  BULAN_LIST.forEach(b => { kpb[b] = document.getElementById('kamp_' + b)?.value || ''; });

  return {
    brand, cabang,
    handleIG        : document.getElementById('fHandleIG').value,
    deadline        : document.getElementById('fDeadline').value,
    warnaUtama      : document.getElementById('hUtama').value,
    warnaAksen      : document.getElementById('hAksen').value,
    warnaBackground : document.getElementById('hBg').value,
    logo            : currentConfig.logo || '',
    paragrafUtama   : document.getElementById('fParagrafUtama').value,
    paragrafTambahan: document.getElementById('fParagrafTambahan').value,
    catatanFormat   : document.getElementById('fCatatanFormat').value,
    dos, donts, kampanyePerBulan: kpb
  };
}

async function saveConfig() {
  const brand  = document.getElementById('selBrand').value;
  const cabang = document.getElementById('selCabang').value;
  if (!brand || !cabang) { showToast('⚠️ Pilih brand dan cabang dulu'); return; }

  const config = collectConfig();
  currentConfig = config;

  if (APPS_SCRIPT_URL === 'https://script.google.com/macros/s/AKfycbz_yv0Ja1kpPXAu__fqm55DfhhPnSWgj0ZTzM78I1NIn7sAK7JiQ-eQKjtohHZo9-k/exec') {
    showToast('⚠️ Apps Script URL belum diisi. Lihat README untuk setup.');
    return;
  }

  try {
    const r = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'saveBriefConfig', brand, cabang, config })
    });
    const d = await r.json();
    showToast(d.status === 'ok' ? '✅ Konfigurasi tersimpan!' : '❌ ' + d.message);
  } catch(e) {
    // Jika CORS error, simpan tetap berhasil di sisi client
    showToast('✅ Konfigurasi tersimpan (mode lokal)');
  }
}

// PREVIEW
function previewBrief() {
  const c = collectConfig();
  const html = generateBriefHTML(c, { namaKOL: '[Nama KOL]', tanggalVisit: new Date().toLocaleDateString('id-ID') });
  document.getElementById('previewContent').innerHTML = html;
  document.getElementById('previewModal').style.display = 'block';
}

function generateBriefHTML(config, kolData) {
  const logoHtml = config.logo
    ? `<img src="${config.logo}" style="max-height:70px;max-width:160px;object-fit:contain;display:block;margin:0 auto 0.8rem">`
    : '';
  const dosHtml  = (config.dos  || []).map(d => `<li style="margin-bottom:0.4rem">${d}</li>`).join('');
  const dontsHtml= (config.donts|| []).map(d => `<li style="margin-bottom:0.4rem">${d}</li>`).join('');

  return `
    <div style="font-family:Georgia,serif;background:${config.warnaBackground};color:#1a1a1a;padding:0;">
      <div style="background:${config.warnaUtama};padding:1.5rem;text-align:center;">
        ${logoHtml}
        <h1 style="color:${config.warnaAksen};font-size:1.5rem;margin-bottom:0.2rem">${config.brand}</h1>
        <p style="color:rgba(255,255,255,0.8);font-size:0.85rem;letter-spacing:0.1em">BRIEF KERJASAMA KOL · ${config.cabang || ''}</p>
      </div>
      <div style="padding:1.5rem;border-bottom:2px solid ${config.warnaAksen}">
        <table style="width:100%;font-size:0.9rem">
          <tr><td style="color:#666;padding:0.3rem 0;width:140px">Nama KOL</td><td style="font-weight:600">: ${kolData.namaKOL}</td></tr>
          <tr><td style="color:#666;padding:0.3rem 0">Cabang</td><td style="font-weight:600">: ${config.cabang}</td></tr>
          <tr><td style="color:#666;padding:0.3rem 0">Tanggal Kunjungan</td><td style="font-weight:600">: ${kolData.tanggalVisit}</td></tr>
          ${config.deadline ? `<tr><td style="color:#666;padding:0.3rem 0">Deadline Konten</td><td style="font-weight:600;color:#c0392b">: ${config.deadline}</td></tr>` : ''}
        </table>
      </div>
      ${config.paragrafUtama ? `<div style="padding:1.5rem;border-bottom:1px solid #eee">
        <h3 style="color:${config.warnaUtama};font-size:0.85rem;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:0.8rem">Garis Besar Tema</h3>
        <p style="line-height:1.7;font-size:0.9rem">${config.paragrafUtama}</p>
        ${config.paragrafTambahan ? `<p style="line-height:1.7;font-size:0.9rem;margin-top:0.8rem">${config.paragrafTambahan}</p>` : ''}
      </div>` : ''}
      ${config.catatanFormat ? `<div style="padding:1.5rem;background:#f9f9f9;border-bottom:1px solid #eee">
        <h3 style="color:${config.warnaUtama};font-size:0.85rem;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:0.5rem">Catatan Format Konten</h3>
        <p style="font-size:0.88rem;line-height:1.6;color:#555">${config.catatanFormat}</p>
      </div>` : ''}
      <div style="padding:1.5rem;display:grid;grid-template-columns:1fr 1fr;gap:1rem">
        <div>
          <h3 style="color:#2e7d32;font-size:0.85rem;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:0.7rem">✅ Dos</h3>
          <ul style="padding-left:1.2rem;font-size:0.88rem;line-height:1.6">${dosHtml}</ul>
        </div>
        <div>
          <h3 style="color:#c0392b;font-size:0.85rem;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:0.7rem">❌ Don'ts</h3>
          <ul style="padding-left:1.2rem;font-size:0.88rem;line-height:1.6">${dontsHtml}</ul>
        </div>
      </div>
      ${config.handleIG ? `<div style="padding:1rem 1.5rem;background:${config.warnaUtama};color:rgba(255,255,255,0.7);font-size:0.8rem;text-align:center">
        Tag kami: <strong style="color:${config.warnaAksen}">${config.handleIG}</strong>
      </div>` : ''}
    </div>`;
}

// TOAST
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }

// Expose generateBriefHTML globally for KOL pages
window.generateBriefHTML = generateBriefHTML;
</script>
</body>
</html>
